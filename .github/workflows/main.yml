name: Build KurdApp
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Download SDK (With Retry)
        run: |
          mkdir -p ~/theos/sdks
          # ئەم فەرمانە تا ٣ جار هەوڵ دەداتەوە ئەگەر دابەزاندن شکستی هێنا
          curl -L --retry 3 --retry-delay 5 "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C ~/theos/sdks
          rm sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: KurdApp-Final-Dylib
          path: .theos/obj/*.dylib
