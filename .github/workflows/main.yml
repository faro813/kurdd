name: Build KurdApp
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Download SDK
        run: |
          mkdir -p ~/theos/sdks
          # بەکارهێنانی لینکێکی تری SDK کە خێراتر و جێگیرترە
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: KurdApp-Final-Dylib
          path: .theos/obj/*.dylib
