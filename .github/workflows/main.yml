name: Build KurdApp
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          # دابەزاندنی تیۆس بەبێ پشکنینی SDK لە سەرەتاوە
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Download SDK Manual
        run: |
          mkdir -p ~/theos/sdks
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C ~/theos/sdks
          rm sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          # لێرەدا ڕێگری دەکات لەوەی تیۆس هەوڵی دابەزاندنی شت بدات
          make package FINALPACKAGE=1
          
      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: KurdApp-Final-Dylib
          path: .theos/obj/*.dylib
