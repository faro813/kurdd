name: Build KurdApp
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos (Manual)
        run: |
          # لێرەدا پێی دەڵێین کە تیۆس ڕاستەوخۆ لە گیتھابەکەی خۆتەوە وەربگرێت
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Extract SDK
        run: |
          mkdir -p ~/theos/sdks
          # دڵنیابە ناوی فایلەکە ڕێک وەک ئەوەیە کە ئاپلۆدت کردووە
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks

      - name: Build Project
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KurdApp-Final-Dylib
          path: .theos/obj/*.dylib
