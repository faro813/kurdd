name: Build KurdApp
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Extract Manual SDK
        run: |
          mkdir -p ~/theos/sdks
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks

      - name: Build Tweak (No Signing)
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1 codesign_flags="-S/dev/null"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KurdApp-Final-Dylib
          path: .theos/obj/*.dylib
